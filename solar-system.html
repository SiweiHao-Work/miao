<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>solar-system</title>
  <style>
    #sun {
      width: 100px;
      height: 100px;
      background-color: red;
      border-radius: 9999px;
      position: fixed;
    }

    #moon {
      width: 80px;
      height: 80px;
      background-color: yellow;
      border-radius: 9999px;
      position: fixed;
    }

    #earth {
      width: 40px;
      height: 40px;
      background-color: lightblue;
      border-radius: 9999px;
      position: fixed;
    }
  </style>
</head>

<body>
  <div id="sun"></div>
  <div id="earth"></div>
  <div id="moon"></div>

  <script>
    var sun = document.querySelector('#sun')
    var moon = document.querySelector('#moon')
    var earth = document.querySelector('#earth')

    requestAnimationFrame(function animate(time) {

      var angle1 = time * 0.001
      var sunX = Math.sin(angle1) * 200 - 25 + window.innerWidth / 2
      var sunY = Math.cos(angle1) * 200 - 25 + window.innerHeight / 2
      sun.style.left = sunX + 'px'
      sun.style.top = sunY + 'px'

      var angle2 = time * 0.002
      var earthX = Math.sin(angle2) * 180 - 15 + sunX + 25
      var earthY = Math.cos(angle2) * 180 - 15 + sunY + 25
      earth.style.left = earthX + 'px'
      earth.style.top = earthY + 'px'

      var angle3 = time * 0.003
      var moonX = Math.sin(angle3) * 20 - 5 + earthX + 15
      var moonY = Math.cos(angle3) * 20 - 5 + earthY + 15
      moon.style.left = moonX + 'px'
      moon.style.top = moonY + 'px'

      requestAnimationFrame(animate)
    })
  </script>
</body>

</html>
